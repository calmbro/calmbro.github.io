name: Update Veille Technologique

on:
  schedule:
    - cron: '0 */6 * * *' # Le robot passe toutes les 6 heures désormais
  workflow_dispatch: # Permet toujours de le lancer à la main si besoin

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run update script
        run: python scripts/update_veille.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/veille.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update veille technologique data [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
