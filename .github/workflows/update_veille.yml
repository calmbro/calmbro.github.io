name: Update Veille Technologique

on:
  schedule:
    - cron: '0 8 * * *' # Chaque jour à 8 heure, ça se réinitialise
  workflow_dispatch: # Permet de déclencher manuellement le workflow

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run update script
        run: python scripts/update_veille.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/veille.json
          git commit -m "chore: update veille technologique data [skip ci]" || echo "No changes to commit"
          git push
